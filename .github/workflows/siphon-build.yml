name: Vessel — build & test

on:
  push:
    branches: [claude/video-downloader-platform-8hsbtk, main]
    paths: ['siphon/**', '.github/workflows/siphon-build.yml']
  workflow_dispatch: {}

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: siphon/backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: siphon/backend/package-lock.json }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  web:
    name: Web build (zip artifact)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: siphon/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: siphon/web/package-lock.json }
      - run: npm ci
      - run: npm run build
      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: vessel-web-dist
          path: siphon/web/dist
          if-no-files-found: error

  android:
    name: Android APK (debug + unsigned release)
    runs-on: ubuntu-latest # Android SDK preinstalled on GitHub runners
    defaults: { run: { working-directory: siphon/android } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest
      - name: Build debug APK
        run: ./gradlew --no-daemon :app:assembleDebug
      - name: Build release APK (unsigned)
        # Uses the baked-in default API URL from build.gradle.kts. Override for
        # a different backend with: -PsiphonApiBaseUrl=https://api.yourdomain.com
        run: ./gradlew --no-daemon :app:assembleRelease
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vessel-debug-apk
          path: siphon/android/app/build/outputs/apk/debug/Vessel-*.apk
          if-no-files-found: error
      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: vessel-release-apk-unsigned
          path: siphon/android/app/build/outputs/apk/release/Vessel-*.apk
          if-no-files-found: error
