name: Build Unit Calculator APK

# Builds a debug APK for the Android app in /android and publishes it as a downloadable
# release asset, so it can be installed directly on a phone without Android Studio.

on:
  push:
    branches: ["claude/unit-calculator-spec-kb3g67"]
    paths: ["android/**", ".github/workflows/android-apk.yml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk unit-calculator-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-calculator-debug-apk
          path: android/unit-calculator-debug.apk
          if-no-files-found: error

      - name: Publish APK to a release (direct download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Unit Calculator — latest debug APK
          body: |
            Debug build of the Unit Calculator Android app, built automatically from the
            `claude/unit-calculator-spec-kb3g67` branch.

            **Install on your phone:** download `unit-calculator-debug.apk` below, open it, and
            allow "install from unknown sources" if prompted. This is an unsigned debug build for
            testing — not a Play Store release.
          files: android/unit-calculator-debug.apk
          prerelease: true
