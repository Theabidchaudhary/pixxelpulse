name: Android APK

on:
  push:
    branches: [claude/android-video-player-app-c7qxyf]
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # The wrapper jar isn't committed; use a pinned Gradle directly.
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Unit tests
        working-directory: android
        run: gradle testDebugUnitTest

      - name: Build debug APK
        working-directory: android
        run: gradle :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orwyx-player-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Rolling prerelease so the APK has a stable, phone-friendly download URL.
      - name: Publish APK to rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk orwyx-player-debug.apk
          gh release delete apk-latest --yes --cleanup-tag || true
          gh release create apk-latest orwyx-player-debug.apk \
            --title "Orwyx Player debug APK" \
            --notes "Debug build of Orwyx Player from commit ${GITHUB_SHA}. Install requires allowing unknown sources." \
            --prerelease \
            --target "$GITHUB_SHA"
